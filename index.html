  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

 white !important;\n  padding: 9px 20px; border-radius: 100px;\n  font-size: 12px !important; font-weight: 600 !important;\n  letter-spacing: .3px;\n  transition: background .25s var(--ease) !important;\n}\n.nav-cta:hover { background: var(--accent) !important; color: var(--ink) !important; }\n\n/* ── HERO ── */\n.hero {\n  min-height: 100vh;\n  padding-top: 60px;\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  align-items: center;\n  max-width: 1200px;\n  margin: 0 auto;\n  padding-left: 60px;\n  padding-right: 40px;\n  gap: 40px;\n}\n.hero-text { padding: 80px 0; }\n.hero-kicker {\n  display: inline-flex; align-items: center; gap: 10px;\n  font-size: 11px; font-weight: 600;\n  letter-spacing: 2px; text-transform: uppercase;\n  color: var(--ink-soft);\n  margin-bottom: 32px;\n}\n.hero-kicker::before {\n  content: '';\n  display: block; width: 28px; height: 1.5px;\n  background: var(--accent);\n}\n.hero h1 {\n  font-family: var(--serif);\n  font-size: clamp(40px, 4.5vw, 62px);\n  font-weight: 700;\n  line-height: 1.08;\n  letter-spacing: -1.5px;\n  color: var(--ink);\n  margin-bottom: 28px;\n}\n.hero h1 em {\n  font-style: italic;\n  font-weight: 400;\n  color: var(--ink-soft);\n}\n.hero h1 .accent-word {\n  color: var(--accent);\n  font-style: italic;\n}\n.hero-body {\n  font-size: 16px;\n  color: var(--ink-soft);\n  line-height: 1.75;\n  max-width: 440px;\n  margin-bottom: 40px;\n}\n.hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }\n.btn-primary {\n  display: inline-flex; align-items: center; gap: 8px;\n  background: var(--accent); color: var(--accent-text);\n  padding: 14px 28px; border-radius: 100px;\n  font-size: 14px; font-weight: 600; text-decoration: none;\n  transition: all .3s var(--ease);\n  border: none; cursor: pointer; font-family: var(--sans);\n}\n.btn-primary:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,154,110,.3); }\n.btn-ghost {\n  display: inline-flex; align-items: center; gap: 6px;\n  background: transparent; color: var(--ink-soft);\n  padding: 14px 24px; border-radius: 100px;\n  font-size: 14px; font-weight: 500; text-decoration: none;\n  border: 1.5px solid rgba(33,43,49,.15);\n  transition: all .25s; cursor: pointer; font-family: var(--sans);\n}\n.btn-ghost:hover { border-color: var(--accent); color: var(--ink); }\n\n/* Hero illustration */\n.hero-visual {\n  position: relative;\n  display: flex; align-items: center; justify-content: center;\n  padding: 60px 20px;\n}\n.hero-bg-block {\n  display: none;\n}\n.hero-flat-wrap {\n  position: relative; z-index: 1;\n  display: flex; align-items: center; justify-content: center;\n}\n.hero-flat-wrap svg {\n  width: 260px;\n  filter: drop-shadow(0 16px 40px rgba(33,43,49,.1));\n}\n\n/* Scroll hint */\n.scroll-hint {\n  margin-top: 52px;\n  font-size: 11px; color: var(--accent);\n  letter-spacing: 2px; text-transform: uppercase;\n  animation: floatDown 2.5s ease-in-out infinite;\n  display: inline-block;\n}\n@keyframes floatDown {\n  0%,100% { transform: translateY(0); opacity: .5; }\n  50% { transform: translateY(6px); opacity: 1; }\n}\n\n/* ── PROBLEM ── */\n.problem {\n  background: var(--surface-dark);\n  color: white;\n  padding: 120px 0;\n  position: relative;\n  overflow: hidden;\n}\n.problem-bg-num {\n  position: absolute;\n  top: -20px; left: -10px;\n  font-family: var(--serif);\n  font-size: clamp(200px, 22vw, 320px);\n  font-weight: 900;\n  color: rgba(255,255,255,.03);\n  line-height: 1;\n  pointer-events: none;\n  user-select: none;\n  letter-spacing: -8px;\n}\n.problem-inner {\n  max-width: 1100px;\n  margin: 0 auto;\n  padding: 0 60px;\n  display: grid;\n  grid-template-columns: 300px 1fr;\n  gap: 80px;\n  align-items: start;\n}\n.problem-left {}\n.section-label {\n  font-size: 11px; letter-spacing: 2px;\n  text-transform: uppercase; font-weight: 600;\n  margin-bottom: 20px;\n  display: flex; align-items: center; gap: 10px;\n}\n.section-label::before {\n  content: '';\n  display: block; width: 20px; height: 1.5px;\n  background: currentColor; flex-shrink: 0;\n}\n.problem .section-label { color: var(--accent); }\n.problem h2 {\n  font-family: var(--serif);\n  font-size: clamp(28px, 3vw, 42px);\n  font-weight: 700;\n  line-height: 1.15;\n  letter-spacing: -.8px;\n  color: white;\n  margin-bottom: 0;\n}\n.problem h2 em {\n  font-style: italic; font-weight: 400;\n  color: rgba(255,255,255,.5);\n}\n.problem-right {}\n.problem-narrative p {\n  font-size: 16px; color: rgba(255,255,255,.7);\n  line-height: 1.8; margin-bottom: 20px;\n}\n.problem-narrative p:last-child { margin-bottom: 0; }\n.problem-narrative strong { font-weight: 600; color: white; }\n.price-callout {\n  margin-top: 36px;\n  padding: 28px 32px;\n  border: 1px solid rgba(255,154,110,.2);\n  border-left: 3px solid var(--accent);\n  border-radius: 2px;\n}\n.price-callout p {\n  font-size: 15px; color: rgba(255,255,255,.65);\n  line-height: 1.7; margin-bottom: 12px;\n}\n.price-callout p:last-child { margin-bottom: 0; color: rgba(255,255,255,.9); font-weight: 500; }\n\n/* Decorative sleeve bottom-right */\n.problem-deco {\n  position: absolute;\n  bottom: -60px; right: -40px;\n  opacity: .07;\n  pointer-events: none;\n}\n\n/* ── HOW IT WORKS ── */\n.how {\n  background: var(--surface-warm);\n  padding: 120px 0;\n  position: relative;\n  overflow: hidden;\n}\n.how-bg-num {\n  position: absolute;\n  top: -30px; right: -20px;\n  font-family: var(--serif);\n  font-size: clamp(200px, 22vw, 320px);\n  font-weight: 900;\n  color: rgba(33,43,49,.04);\n  line-height: 1;\n  pointer-events: none;\n  user-select: none;\n  letter-spacing: -8px;\n}\n.how-inner {\n  max-width: 1100px;\n  margin: 0 auto;\n  padding: 0 60px;\n}\n.how-header {\n  max-width: 560px;\n  margin-bottom: 72px;\n}\n.how .section-label { color: var(--ink-soft); margin-bottom: 20px; }\n.how h2 {\n  font-family: var(--serif);\n  font-size: clamp(28px, 3vw, 44px);\n  font-weight: 700;\n  line-height: 1.15;\n  letter-spacing: -.8px;\n  color: var(--ink);\n}\n.how h2 em { font-style: italic; font-weight: 400; color: var(--ink-soft); }\n.steps-grid {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 0;\n  border-top: 1px solid rgba(33,43,49,.12);\n}\n.step-item {\n  padding: 44px 40px 44px 0;\n  border-right: 1px solid rgba(33,43,49,.12);\n  position: relative;\n}\n.step-item:last-child { border-right: none; padding-right: 0; padding-left: 40px; }\n.step-item:nth-child(2) { padding: 44px 40px; }\n.step-illustration {\n  height: 80px;\n  display: flex; align-items: flex-end;\n  margin-bottom: 28px;\n}\n.step-illustration svg { height: 100%; width: auto; }\n.step-num-label {\n  font-size: 11px; font-weight: 700;\n  letter-spacing: 2px; text-transform: uppercase;\n  color: var(--accent); margin-bottom: 10px;\n}\n.step-item h3 {\n  font-family: var(--serif);\n  font-size: 22px; font-weight: 700;\n  line-height: 1.2; letter-spacing: -.3px;\n  color: var(--ink); margin-bottom: 12px;\n}\n.step-item p {\n  font-size: 14px; color: var(--ink-soft);\n  line-height: 1.7;\n}\n\n/* ── DISCLAIMER ── */\n.disclaimer {\n  padding: 120px 0;\n  position: relative;\n  overflow: hidden;\n}\n.disclaimer-inner {\n  max-width: 1100px;\n  margin: 0 auto;\n  padding: 0 60px;\n  display: grid;\n  grid-template-columns: 1fr 440px;\n  gap: 80px;\n  align-items: center;\n}\n.disclaimer .section-label { color: var(--ink-soft); margin-bottom: 20px; }\n.disclaimer h2 {\n  font-family: var(--serif);\n  font-size: clamp(30px, 3.5vw, 50px);\n  font-weight: 700;\n  line-height: 1.1;\n  letter-spacing: -1.2px;\n  color: var(--ink);\n  margin-bottom: 28px;\n}\n.disclaimer h2 em { font-style: italic; font-weight: 400; }\n.disclaimer p {\n  font-size: 16px; color: var(--ink-soft);\n  line-height: 1.8; margin-bottom: 16px;\n}\n.disclaimer-quote {\n  font-family: var(--serif);\n  font-size: 22px; font-style: italic;\n  color: var(--accent);\n  line-height: 1.5;\n  padding-left: 24px;\n  border-left: 3px solid var(--accent);\n  margin: 36px 0;\n}\n.disclaimer-visual {\n  display: flex; align-items: center; justify-content: center;\n  position: relative;\n}\n.disclaimer-pocket-wrap {\n  position: relative;\n}\n.disclaimer-pocket-wrap svg {\n  width: 320px;\n}\n\n/* ── VALIDATION ── */\n.validation {\n  padding: 100px 0 80px;\n  text-align: center;\n  border-top: 1px solid rgba(33,43,49,.07);\n}\n.validation-inner {\n  max-width: 560px;\n  margin: 0 auto;\n  padding: 0 24px;\n}\n.validation h2 {\n  font-family: var(--serif);\n  font-size: clamp(26px, 3vw, 40px);\n  font-weight: 700;\n  letter-spacing: -.8px;\n  line-height: 1.2;\n  margin-bottom: 12px;\n  color: var(--ink);\n}\n.validation h2 em { font-style: italic; font-weight: 400; color: var(--ink-soft); }\n.validation-sub {\n  font-size: 16px; color: var(--ink-soft);\n  margin-bottom: 40px; line-height: 1.6;\n}\n.validation-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }\n.btn-validate {\n  display: inline-flex; align-items: center; gap: 8px;\n  padding: 14px 26px; border-radius: 100px;\n  font-size: 14px; font-weight: 600;\n  border: none; cursor: pointer;\n  font-family: var(--sans);\n  transition: all .3s var(--ease);\n}\n.btn-yes { background: var(--surface-dark); color: white; }\n.btn-yes:hover { background: var(--accent); color: var(--accent-text); }\n.btn-yes.clicked {\n  background: var(--accent-soft); color: var(--accent-text);\n  border: 1.5px solid var(--accent); pointer-events: none;\n}\n.btn-email { background: var(--accent); color: var(--accent-text); }\n.btn-email:hover { background: var(--accent-hover); transform: translateY(-2px); }\n.email-form {\n  display: none; max-width: 360px; margin: 0 auto;\n  animation: slideUp .4s var(--ease);\n}\n.email-form.show { display: block; }\n@keyframes slideUp {\n  from { opacity: 0; transform: translateY(12px); }\n  to { opacity: 1; transform: translateY(0); }\n}\n.email-row { display: flex; gap: 8px; }\n.email-input {\n  flex: 1; padding: 13px 18px;\n  border: 1.5px solid rgba(33,43,49,.15);\n  border-radius: 100px;\n  font-size: 14px; font-family: var(--sans);\n  outline: none; background: white;\n  transition: border .2s;\n}\n.email-input:focus { border-color: var(--accent); }\n.email-submit {\n  padding: 13px 22px;\n  background: var(--ink); color: white;\n  border: none; border-radius: 100px;\n  font-size: 13px; font-weight: 600; cursor: pointer;\n  transition: all .3s; font-family: var(--sans);\n}\n.email-submit:hover { background: var(--accent); color: var(--accent-text); }\n.email-note { font-size: 11px; color: var(--ink-soft); margin-top: 10px; }\n.email-success {\n  display: none; padding: 16px;\n  background: var(--accent-soft); color: var(--accent-text);\n  border-radius: 12px; font-size: 14px; font-weight: 500;\n  animation: slideUp .4s var(--ease);\n}\n.email-success.show { display: block; }\n.validation-count { font-size: 12px; color: var(--ink-soft); margin-top: 16px; }\n.support-link {\n  display: inline-block; margin-top: 32px;\n  font-size: 13px; color: var(--ink-soft); text-decoration: none;\n  transition: color .2s;\n}\n.support-link:hover { color: var(--ink); }\n\n/* ── FOOTER ── */\nfooter {\n  padding: 24px 60px;\n  border-top: 1px solid rgba(33,43,49,.07);\n  display: flex; justify-content: space-between; align-items: center;\n  max-width: 1200px; margin: 0 auto;\n}\nfooter span, footer a {\n  font-size: 12px; color: var(--ink-soft); text-decoration: none;\n}\nfooter a:hover { color: var(--ink); }\n.footer-links { display: flex; gap: 24px; }\n\n/* ── REVEAL ── */\n.reveal {\n  opacity: 0; transform: translateY(24px);\n  transition: opacity .65s var(--ease), transform .65s var(--ease);\n}\n.reveal.visible { opacity: 1; transform: translateY(0); }\n.reveal-delay-1 { transition-delay: .1s; }\n.reveal-delay-2 { transition-delay: .2s; }\n.reveal-delay-3 { transition-delay: .3s; }\n\n/* ── TABLET ── */\n@media (max-width: 900px) {\n  nav { padding: 0 24px; }\n  .nav-links a:not(.nav-cta) { display: none; }\n\n  .hero {\n    grid-template-columns: 1fr;\n    padding: 90px 24px 60px;\n    gap: 40px;\n    min-height: auto;\n  }\n  .hero-text { padding: 20px 0 0; }\n  .hero-visual { justify-content: center; padding: 20px 0; }\n  .hero-bg-block { display: none; }\n  .hero-flat-wrap img { width: 260px !important; }\n\n  .problem { padding: 72px 0; }\n  .problem-inner { grid-template-columns: 1fr; padding: 0 24px; gap: 32px; }\n\n  .how { padding: 72px 0; }\n  .how-inner { padding: 0 24px; }\n  .steps-grid { grid-template-columns: 1fr; border-top: none; }\n  .step-item {\n    border-right: none !important;\n    border-top: 1px solid rgba(33,43,49,.12);\n    padding: 32px 0 !important;\n  }\n\n  .disclaimer { padding: 72px 0; }\n  .disclaimer-inner { grid-template-columns: 1fr; padding: 0 24px; gap: 32px; }\n  .disclaimer-visual { display: none; }\n\n  .validation { padding: 72px 0 48px; }\n  footer { padding: 20px 24px; flex-direction: column; gap: 10px; text-align: center; }\n}\n\n/* ── MOBILE ── */\n@media (max-width: 600px) {\n  nav { padding: 0 16px; height: 52px; }\n  .logo { font-size: 15px; }\n  .nav-cta { padding: 7px 14px !important; font-size: 11px !important; }\n\n  .hero {\n    padding: 72px 20px 48px;\n    gap: 32px;\n  }\n  .hero-kicker { font-size: 10px; margin-bottom: 20px; }\n  .hero h1 {\n    font-size: clamp(30px, 8vw, 40px);\n    letter-spacing: -.8px;\n    margin-bottom: 18px;\n  }\n  .hero-body { font-size: 15px; margin-bottom: 28px; }\n  .hero-actions { gap: 10px; }\n  .btn-primary, .btn-ghost { padding: 12px 22px; font-size: 14px; }\n  .hero-flat-wrap img { width: 200px !important; }\n  .scroll-hint { margin-top: 32px; }\n\n  .problem { padding: 56px 0; }\n  .problem-inner { padding: 0 20px; gap: 24px; }\n  .problem h2 { font-size: clamp(24px, 7vw, 32px); }\n  .problem-narrative p { font-size: 15px; }\n  .price-callout { padding: 20px; }\n\n  .how { padding: 56px 0; }\n  .how-inner { padding: 0 20px; }\n  .how-header { margin-bottom: 40px; }\n  .how h2 { font-size: clamp(24px, 7vw, 34px); }\n  .step-item { padding: 24px 0 !important; }\n  .step-item h3 { font-size: 18px; }\n  .step-item p { font-size: 14px; }\n  .step-illustration { height: 90px; }\n\n  .disclaimer { padding: 56px 0; }\n  .disclaimer-inner { padding: 0 20px; }\n  .disclaimer h2 { font-size: clamp(26px, 7vw, 36px); }\n  .disclaimer p { font-size: 15px; }\n  .disclaimer-quote { font-size: 18px; margin: 24px 0; }\n\n  .validation { padding: 56px 0 40px; }\n  .validation-inner { padding: 0 20px; }\n  .validation h2 { font-size: clamp(22px, 7vw, 32px); }\n  .validation-sub { font-size: 15px; margin-bottom: 28px; }\n  .validation-buttons { flex-direction: column; align-items: center; gap: 10px; }\n  .btn-validate { width: 100%; max-width: 280px; justify-content: center; }\n  .email-row { flex-direction: column; gap: 10px; }\n  .email-input, .email-submit { width: 100%; border-radius: 12px; }\n\n  footer { padding: 16px 20px; gap: 8px; font-size: 11px; }\n  .footer-links { gap: 16px; }\n}\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n\n<form name=\"validation\" data-netlify=\"true\" netlify-honeypot=\"bot-field\" hidden=\"\">\n  <input name=\"form-name\" value=\"validation\">\n  <input name=\"action\" value=\"this-makes-sense\">\n<\u002Fform>\n\n<!-- NAV -->\n<nav>\n  <a href=\"/\" class=\"logo\">Flat<em>Labs<\u002Fem><\u002Fa>\n  <div class=\"nav-links\">\n    <a href=\"#problem\">Why<\u002Fa>\n    <a href=\"#how\">How it works<\u002Fa>\n    <a href=\"learn/\">Glossary<\u002Fa>\n    <a href=\"app.html\" class=\"nav-cta\">Try the studio<\u002Fa>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- HERO -->\n<section class=\"hero\">\n  <div class=\"hero-text\">\n    <div class=\"hero-kicker reveal\">Fashion Flat Generator<\u002Fdiv>\n    <h1 class=\"reveal reveal-delay-1\">\n      You shouldn't need<br>\n      to be an <em>Illustrator<\u002Fem><br>\n      expert to show<br>\n      <span class=\"accent-word\">what a shirt looks like.<\u002Fspan>\n    <\u002Fh1>\n    <p class=\"hero-body reveal reveal-delay-2\">\n      Whether you're designing a collection, pitching an idea, or sending specs to a factory — at some point you need a flat. A clean technical drawing of a garment. And right now, getting one is harder than it should be.\n    <\u002Fp>\n    <div class=\"hero-actions reveal reveal-delay-3\">\n      <a href=\"app.html\" class=\"btn-primary\">\n        Try it — it's free\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M12 5l7 7-7 7\"><\u002Fpath><\u002Fsvg>\n      <\u002Fa>\n      <a href=\"#problem\" class=\"btn-ghost\">See why this exists<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"scroll-hint reveal\" style=\"transition-delay:.5s\">↓ scroll<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hero-visual\">\n    <div class=\"hero-bg-block\"><\u002Fdiv>\n    <div class=\"hero-flat-wrap reveal reveal-delay-2\">\n      <img src=\"59641aa7-2f66-4eca-ba92-1e6ad9e57d36\" alt=\"Technical flat — T-shirt\" style=\"width:420px; display:block; position:relative; z-index:1;\">\n      <!-- T-shirt flat placeholder while img loads -->\n      <svg viewBox=\"0 0 340 400\" xmlns=\"http://www.w3.org/2000/svg\" style=\"display:none\">\n        <!-- Left sleeve shape -->\n        <path fill=\"#212B31\" d=\"M 88 96 L 42 116 L 64 156 L 90 142 L 88 96 Z\"><\u002Fpath>\n        <!-- Right sleeve shape -->\n        <path fill=\"#212B31\" d=\"M 252 96 L 298 116 L 276 156 L 250 142 L 252 96 Z\"><\u002Fpath>\n        <!-- Main body -->\n        <path fill=\"#212B31\" d=\"\n          M 128 78\n          C 142 72 158 68 170 68\n          C 182 68 198 72 212 78\n          L 252 96 L 250 142\n          L 248 390 C 248 396 243 400 237 400\n          L 103 400 C 97 400 92 396 92 390\n          L 90 142 L 88 96 Z\n        \"><\u002Fpath>\n        <!-- Neck opening — punched out white -->\n        <path fill=\"white\" d=\"M 148 80 C 153 100 165 116 170 118 C 175 116 187 100 192 80 C 182 74 158 74 148 80 Z\"><\u002Fpath>\n        <!-- Neck inner rib accent -->\n        <path fill=\"#ff9a6e\" d=\"M 151 82 C 155 100 165 114 170 116 C 175 114 185 100 189 82 C 180 77 160 77 151 82 Z\"><\u002Fpath>\n        <!-- Neck rib cut back to white center -->\n        <path fill=\"white\" d=\"M 154 84 C 158 100 166 113 170 115 C 174 113 182 100 186 84 C 178 80 162 80 154 84 Z\"><\u002Fpath>\n\n        <!-- Left shoulder accent line -->\n        <path fill=\"#ff9a6e\" d=\"M 128 78 L 90 142 L 95 144 L 133 80 Z\"><\u002Fpath>\n        <!-- Right shoulder accent line -->\n        <path fill=\"#ff9a6e\" d=\"M 212 78 L 250 142 L 245 144 L 207 80 Z\"><\u002Fpath>\n\n        <!-- Left sleeve cuff accent -->\n        <path fill=\"#ff9a6e\" d=\"M 42 116 L 64 156 L 69 153 L 47 113 Z\"><\u002Fpath>\n        <!-- Right sleeve cuff accent -->\n        <path fill=\"#ff9a6e\" d=\"M 298 116 L 276 156 L 271 153 L 293 113 Z\"><\u002Fpath>\n\n        <!-- Hem accent -->\n        <rect fill=\"#ff9a6e\" x=\"92\" y=\"388\" width=\"156\" height=\"8\" rx=\"1\"><\u002Frect>\n\n        <!-- Chest pocket -->\n        <rect fill=\"white\" x=\"150\" y=\"170\" width=\"58\" height=\"50\" rx=\"2\"><\u002Frect>\n        <rect fill=\"#ff9a6e\" x=\"150\" y=\"170\" width=\"58\" height=\"10\" rx=\"1\"><\u002Frect>\n        <rect fill=\"white\" x=\"150\" y=\"176\" width=\"58\" height=\"4\"><\u002Frect>\n      <\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PROBLEM -->\n<section class=\"problem\" id=\"problem\">\n  <div class=\"problem-bg-num\">01<\u002Fdiv>\n  <div class=\"problem-inner\">\n    <div class=\"problem-left\">\n      <div class=\"section-label reveal\">The problem<\u002Fdiv>\n      <h2 class=\"reveal reveal-delay-1\">I just needed<br>a <em>flat.<\u002Fem><br>Here's what<br>I found instead.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"problem-right\">\n      <div class=\"problem-narrative reveal\">\n        <p>You'd think in 2026 there would be a simple way to get a clean technical drawing of a t-shirt. There isn't.<\u002Fp>\n        <p>You Google \"fashion flat template.\" You scroll through dozens of results — different proportions, different styles, different quality. Nothing matches what you have in your head. You find something close, maybe on a marketplace. You pay for it. You open the file: <strong>ungrouped layers, weird anchor points, no logical structure.<\u002Fstrong><\u002Fp>\n        <p>You try to edit it. Change the neckline, adjust the sleeves. Thirty minutes later you're still fighting with the pen tool. And none of it is made for production.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"price-callout reveal reveal-delay-1\">\n        <p>Or you find a tool that actually works. Real professional software with accurate measurements and proper construction. That'll be <strong>€5,000. Maybe more.<\u002Fstrong><\u002Fp>\n        <p style=\"margin-top:12px;color:rgba(255,255,255,.85);font-weight:500;\">Spend hours on repetitive manual work, or spend thousands on something that should be accessible to anyone who works with garments. <strong>There's something broken about that.<\u002Fstrong><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Decorative sleeve -->\n  <div class=\"problem-deco\">\n    <svg width=\"420\" height=\"340\" viewBox=\"0 0 420 340\" fill=\"none\">\n      <path d=\"M 60 30 L 380 60 L 420 300 L 30 340 Z\" stroke=\"white\" stroke-width=\"2\" fill=\"none\" opacity=\".6\"><\u002Fpath>\n      <path d=\"M 65 40 L 375 69 L 414 295 L 38 332 Z\" stroke=\"white\" stroke-width=\"1\" stroke-dasharray=\"6 4\" fill=\"none\" opacity=\".5\"><\u002Fpath>\n      <line x1=\"30\" y1=\"340\" x2=\"60\" y2=\"30\" stroke=\"white\" stroke-width=\"1\" stroke-dasharray=\"5 4\" opacity=\".4\"><\u002Fline>\n      <line x1=\"420\" y1=\"300\" x2=\"380\" y2=\"60\" stroke=\"white\" stroke-width=\"1\" stroke-dasharray=\"5 4\" opacity=\".4\"><\u002Fline>\n    <\u002Fsvg>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- HOW IT WORKS -->\n<section class=\"how\" id=\"how\">\n  <div class=\"how-bg-num\">02<\u002Fdiv>\n  <div class=\"how-inner\">\n    <div class=\"how-header\">\n      <div class=\"section-label reveal\">How it works<\u002Fdiv>\n      <h2 class=\"reveal reveal-delay-1\">What if you could just<br><em>pick a shirt and go?<\u002Fem><\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"steps-grid\">\n      <!-- Step 1 -->\n      <div class=\"step-item reveal\">\n        <div class=\"step-illustration\">\n          <svg id=\"Layer_6\" xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 300 300\" style=\"height:110px;width:auto\">\n            <path fill=\"none\" stroke=\"#fb8f6c\" stroke-width=\"11\" stroke-linejoin=\"round\" d=\"M185.81,62.56s47.8,16.51,76.06,7.85\"><\u002Fpath>\n            <path fill=\"none\" stroke=\"#fb8f6c\" stroke-width=\"11\" stroke-linejoin=\"round\" d=\"M179.74,57.44c5.2,47.38,56.15,89.11,56.15,89.11l27.19-16.96\"><\u002Fpath>\n            <path fill=\"none\" stroke=\"#231f20\" stroke-width=\"4\" stroke-linecap=\"square\" stroke-linejoin=\"round\" d=\"M109.75,245.48v-47.11s26.1-53.78-4.12-115.56l81.78-28s32.61,21.04,70.82,9.67\"><\u002Fpath>\n            <polyline fill=\"none\" stroke=\"#231f20\" stroke-width=\"4\" stroke-linejoin=\"round\" points=\"105.63 82.81 40.74 143.89 81.19 208.59 109.75 198.37\"><\u002Fpolyline>\n            <line fill=\"none\" stroke=\"#231f20\" stroke-width=\"4\" stroke-linejoin=\"round\" x1=\"92.16\" y1=\"204.66\" x2=\"50.01\" y2=\"135.28\"><\u002Fline>\n            <path fill=\"none\" stroke=\"#231f20\" stroke-width=\"4\" stroke-linecap=\"square\" stroke-linejoin=\"round\" d=\"M173.89,60.48c0,42.25,61.96,93.44,61.96,93.44l29-17.78\"><\u002Fpath>\n            <path fill=\"none\" stroke=\"#231f20\" stroke-width=\"4\" stroke-linecap=\"square\" stroke-linejoin=\"round\" d=\"M186.93,56.93c-.66,37.05,43.6,75.8,49.7,82.22l21.6-13.55\"><\u002Fpath>\n            <path fill=\"none\" stroke=\"#231f20\" stroke-width=\"4\" stroke-linejoin=\"round\" d=\"M189.46,70.27s40.36,16.44,73.84,5.18\"><\u002Fpath>\n            <line fill=\"none\" stroke=\"#231f20\" stroke-width=\"4\" stroke-linejoin=\"round\" x1=\"174.96\" y1=\"72.3\" x2=\"110.69\" y2=\"94.37\"><\u002Fline>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"step-num-label\">Step 01<\u002Fdiv>\n        <h3>Pick a garment<\u002Fh3>\n        <p>T-shirt, pants, jacket. Start with a base shape that makes sense for your project.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- Step 2 -->\n      <div class=\"step-item reveal reveal-delay-1\">\n        <div class=\"step-illustration\">\n          <svg id=\"Layer_5\" xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 300 300\" style=\"height:110px;width:auto\">\n            <path fill=\"none\" stroke=\"#fb8f6c\" stroke-width=\"9\" stroke-miterlimit=\"10\" d=\"M192.51,57.41s-.92,41.73-42.4,41.73-42.26-42.29-42.26-42.29\"><\u002Fpath>\n            <path fill=\"none\" stroke=\"#231f20\" stroke-width=\"4\" stroke-linejoin=\"round\" d=\"M221.98,246.14c7.83-.18,9.42-6.1,9.42-10.01s.09-153.59.09-159.19-2.67-8.01-6.48-9.25-41.02-12.96-41.02-12.96c0,0-6.65,10.12-33.78,10.12s-33.98-10.12-33.98-10.12c0,0-37.21,11.72-41.02,12.96s-6.48,3.65-6.48,9.25.09,155.27.09,159.19,1.59,9.84,9.42,10.01c3.88.09,139.85.09,143.73,0Z\"><\u002Fpath>\n            <path fill=\"none\" stroke=\"#231f20\" stroke-width=\"4\" stroke-miterlimit=\"10\" d=\"M198.77,59.4s-4.44,46.19-48.51,46.19h-.3c-44.08,0-48.51-46.19-48.51-46.19\"><\u002Fpath>\n            <path fill=\"none\" stroke=\"#231f20\" stroke-width=\"4\" stroke-miterlimit=\"10\" d=\"M186.28,55.45s.68,37.51-36.33,37.51h.32c-37.01,0-36.33-37.51-36.33-37.51\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"step-num-label\">Step 02<\u002Fdiv>\n        <h3>Choose your components<\u002Fh3>\n        <p>Mix and match: round neck or V-neck, set-in sleeves or long, add a pocket, change the seam style.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- Step 3 -->\n      <div class=\"step-item reveal reveal-delay-2\">\n        <div class=\"step-illustration\">\n          <svg id=\"Layer_7\" xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 300 300\" style=\"height:110px;width:auto\">\n            <line fill=\"none\" stroke=\"#fb8f6c\" stroke-width=\"17\" stroke-linecap=\"round\" stroke-linejoin=\"round\" x1=\"66.99\" y1=\"239.75\" x2=\"233.01\" y2=\"239.65\"><\u002Fline>\n            <polygon fill=\"none\" stroke=\"#231f20\" stroke-width=\"4\" stroke-linecap=\"square\" stroke-linejoin=\"round\" points=\"93.56 150 150.1 212.37 205.11 150 174.89 150 174.3 55.33 123.33 55.33 123.93 150 93.56 150\"><\u002Fpolygon>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"step-num-label\">Step 03<\u002Fdiv>\n        <h3>Export<\u002Fh3>\n        <p>Download a clean, layered SVG. Open it in Illustrator, drop it in a tech pack, or send it to a factory.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Garment icons row -->\n    <div style=\"margin-top: 64px; padding-top: 40px; border-top: 1px solid rgba(33,43,49,.1); display: flex; gap: 48px; align-items: center;\" class=\"reveal\">\n      <span style=\"font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--ink-soft); font-weight:600;\">Available now<\u002Fspan>\n      <div style=\"display:flex; gap:32px; align-items:center;\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:6px;\">\n          <svg width=\"32\" height=\"32\" viewBox=\"0 0 48 48\" fill=\"none\" style=\"opacity:.5\">\n            <path d=\"M32.5894 41.9812H12.2318C11.3024 41.9803 10.424 41.8895 9.96697 40.8777L9.94967 40.8385C9.57552 40.0081 9.95347 39.4707 10.2095 38.7151C10.889 36.7098 11.1382 34.5185 11.3283 32.4223L11.4789 29.9422C11.4929 29.6738 11.5369 29.4083 11.5451 29.1395L11.5438 23.1286C11.4935 22.068 11.2869 21.0138 11.2436 19.9546C9.22086 19 >Honest disclaimer<\u002Fdiv>\n      <h2 class=\"reveal reveal-delay-1\">This is a<br><em>proof of concept.<\u002Fem><\u002Fh2>\n      <p class=\"reveal reveal-delay-2\">What you see here is the beginning — not the finished product. The mannequin isn't using real production measurements yet. The garment options are limited.<\u002Fp>\n      <div class=\"disclaimer-quote reveal reveal-delay-2\">Does this make sense to you?<\u002Fdiv>\n      <p class=\"reveal reveal-delay-3\">Because honestly — I'm not sure if I'm the only person who thinks this should have existed years ago. If you've ever wasted time searching for a flat, fighting with a template, or paying too much for something that should be simple — then maybe this resonates.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"disclaimer-visual reveal reveal-delay-2\">\n      <div class=\"disclaimer-pocket-wrap\">\n        <!-- Large decorative pocket + seam detail -->\n        <svg viewBox=\"0 0 320 380\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n          <!-- Background seam lines (fabric texture) -->\n          <line x1=\"0\" y1=\"60\" x2=\"320\" y2=\"60\" stroke=\"#e8e0d0\" stroke-width=\"1\" stroke-dasharray=\"6 4\"><\u002Fline>\n          <line x1=\"0\" y1=\"64\" x2=\"320\" y2=\"64\" stroke=\"#e8e0d0\" stroke-width=\".7\" stroke-dasharray=\"6 4\"><\u002Fline>\n          <line x1=\"0\" y1=\"300\" x2=\"320\" y2=\"300\" stroke=\"#e8e0d0\" stroke-width=\"1\" stroke-dasharray=\"6 4\"><\u002Fline>\n          <line x1=\"0\" y1=\"304\" x2=\"320\" y2=\"304\" stroke=\"#e8e0d0\" stroke-width=\".7\" stroke-dasharray=\"6 4\"><\u002Fline>\n\n          <!-- Big chest pocket, centered -->\n          <rect x=\"60\" y=\"90\" width=\"200\" height=\"170\" rx=\"3\" stroke=\"#212B31\" stroke-width=\"2.5\" fill=\"white\"><\u002Frect>\n\n          <!-- Pocket top stitch (double) -->\n          <line x1=\"63\" y1=\"104\" x2=\"257\" y2=\"104\" stroke=\"#212B31\" stroke-width=\"1.2\" stroke-dasharray=\"5 3.5\"><\u002Fline>\n          <line x1=\"63\" y1=\"110\" x2=\"257\" y2=\"110\" stroke=\"#212B31\" stroke-width=\".8\" stroke-dasharray=\"5 3.5\" opacity=\".6\"><\u002Fline>\n\n          <!-- Pocket side stitches -->\n          <line x1=\"71\" y1=\"104\" x2=\"71\" y2=\"255\" stroke=\"#212B31\" stroke-width=\".8\" stroke-dasharray=\"4 3\" opacity=\".5\"><\u002Fline>\n          <line x1=\"249\" y1=\"104\" x2=\"249\" y2=\"255\" stroke=\"#212B31\" stroke-width=\".8\" stroke-dasharray=\"4 3\" opacity=\".5\"><\u002Fline>\n\n          <!-- Pocket bottom stitches -->\n          <line x1=\"63\" y1=\"249\" x2=\"257\" y2=\"249\" stroke=\"#212B31\" stroke-width=\".8\" stroke-dasharray=\"4 3\" opacity=\".5\"><\u002Fline>\n\n          <!-- Side seam left of pocket area -->\n          <line x1=\"20\" y1=\"0\" x2=\"20\" y2=\"380\" stroke=\"#212B31\" stroke-width=\"1.5\" stroke-dasharray=\"7 5\" opacity=\".2\"><\u002Fline>\n          <line x1=\"14\" y1=\"0\" x2=\"14\" y2=\"380\" stroke=\"#212B31\" stroke-width=\".8\" stroke-dasharray=\"7 5\" opacity=\".12\"><\u002Fline>\n\n          <!-- Side seam right -->\n          <line x1=\"300\" y1=\"0\" x2=\"300\" y2=\"380\" stroke=\"#212B31\" stroke-width=\"1.5\" stroke-dasharray=\"7 5\" opacity=\".2\"><\u002Fline>\n          <line x1=\"306\" y1=\"0\" x2=\"306\" y2=\"380\" stroke=\"#212B31\" stroke-width=\".8\" stroke-dasharray=\"7 5\" opacity=\".12\"><\u002Fline>\n\n          <!-- Measurement callout -->\n          <line x1=\"60\" y1=\"78\" x2=\"260\" y2=\"78\" stroke=\"#ff9a6e\" stroke-width=\"1\" opacity=\".6\"><\u002Fline>\n          <line x1=\"60\" y1=\"74\" x2=\"60\" y2=\"82\" stroke=\"#ff9a6e\" stroke-width=\"1\" opacity=\".6\"><\u002Fline>\n          <line x1=\"260\" y1=\"74\" x2=\"260\" y2=\"82\" stroke=\"#ff9a6e\" stroke-width=\"1\" opacity=\".6\"><\u002Fline>\n          <text x=\"160\" y=\"73\" font-family=\"'DM Sans', sans-serif\" font-size=\"10\" fill=\"#ff9a6e\" text-anchor=\"middle\" opacity=\".8\">12 cm<\u002Ftext>\n\n          <!-- Label inside pocket -->\n          <text x=\"160\" y=\"188\" font-family=\"'DM Sans', sans-serif\" font-size=\"11\" fill=\"#5F7385\" text-anchor=\"middle\" opacity=\".6\" font-weight=\"600\" letter-spacing=\"1\">CHEST POCKET<\u002Ftext>\n          <text x=\"160\" y=\"202\" font-family=\"'DM Sans', sans-serif\" font-size=\"9\" fill=\"#5F7385\" text-anchor=\"middle\" opacity=\".5\">patch · double topstitch<\u002Ftext>\n\n          <!-- Corner detail zoom indicator -->\n          <rect x=\"58\" y=\"88\" width=\"20\" height=\"20\" stroke=\"#ff9a6e\" stroke-width=\"1\" fill=\"none\" opacity=\".5\" rx=\"1\"><\u002Frect>\n          <line x1=\"78\" y1=\"98\" x2=\"98\" y2=\"78\" stroke=\"#ff9a6e\" stroke-width=\".8\" opacity=\".4\"><\u002Fline>\n          <!-- Zoomed corner -->\n          <rect x=\"96\" y=\"54\" width=\"50\" height=\"50\" stroke=\"#ff9a6e\" stroke-width=\"1\" fill=\"rgba(255,239,212,.4)\" rx=\"2\"><\u002Frect>\n          <path d=\"M 100 100 C 100 96 102 94 106 94\" stroke=\"#212B31\" stroke-width=\"2.5\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n          <path d=\"M 101 100 C 101 96.5 103 95 106 95\" stroke=\"#212B31\" stroke-width=\".8\" stroke-dasharray=\"3 2\" fill=\"none\" opacity=\".6\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- VALIDATION -->\n<section class=\"validation\" id=\"validate\">\n  <div class=\"validation-inner\">\n    <div class=\"section-label reveal\" style=\"justify-content:center\">Make your voice heard<\u002Fdiv>\n    <h2 class=\"reveal reveal-delay-1\">This makes <em>sense<\u002Fem><br>to me.<\u002Fh2>\n    <p class=\"validation-sub reveal reveal-delay-2\">If you've ever needed a flat and couldn't find one, let me know. It takes two seconds.<\u002Fp>\n\n    <div class=\"validation-buttons reveal reveal-delay-2\">\n      <button class=\"btn-validate btn-yes\" id=\"btnYes\" type=\"button\" onclick=\"handleYes()\">\n        <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n        This makes sense\n      <\u002Fbutton>\n      <button class=\"btn-validate btn-email\" id=\"btnEmail\" type=\"button\" onclick=\"showEmail()\">\n        Keep me posted\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M12 5l7 7-7 7\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n    <\u002Fdiv>\n\n    <form name=\"waitlist\" method=\"POST\" data-netlify=\"true\" netlify-honeypot=\"bot-field\" class=\"email-form\" id=\"emailForm\">\n      <input type=\"hidden\" name=\"form-name\" value=\"waitlist\">\n      <p style=\"display:none;\"><label>Don't fill this out: <input name=\"bot-field\"><\u002Flabel><\u002Fp>\n      <div class=\"email-row\">\n        <input type=\"email\" name=\"email\" class=\"email-input\" id=\"emailInput\" placeholder=\"your@email.com\" required=\"\">\n        <button type=\"submit\" class=\"email-submit\">Send<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"email-note\">No spam. Just updates when the real version is ready.<\u002Fdiv>\n    <\u002Fform>\n\n    <div class=\"email-success\" id=\"emailSuccess\">Got it — you'll be the first to know. Thank you.<\u002Fdiv>\n    <div class=\"validation-count\" id=\"validationCount\"><\u002Fdiv>\n\n    <div style=\"margin-top: 36px;\" class=\"reveal\">\n      <a href=\"app.html\" class=\"btn-primary\" style=\"display:inline-flex\">\n        Try it — it's free\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M12 5l7 7-7 7\"><\u002Fpath><\u002Fsvg>\n      <\u002Fa>\n    <\u002Fdiv>\n\n    <a href=\"https://buymeacoffee.com/flatlabs\" target=\"_blank\" rel=\"noopener\" class=\"support-link\">\n      ☕ Building this takes time. Coffee helps.\n    <\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer>\n  <span>© 2026 FlatLabs<\u002Fspan>\n  <div class=\"footer-links\">\n    <a href=\"https://buymeacoffee.com/flatlabs\" target=\"_blank\" rel=\"noopener\">Buy me a coffee<\u002Fa>\n    <a href=\"mailto:flatsgenerator@gmail.com\">Contact<\u002Fa>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n// Scroll reveal\nconst reveals = document.querySelectorAll('.reveal');\nconst observer = new IntersectionObserver((entries) => {\n  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });\n}, { threshold: 0.08, rootMargin: '0px 0px -20px 0px' });\nreveals.forEach(el => observer.observe(el));\n\n// Validation\nlet votes = JSON.parse(localStorage.getItem('fl_votes') || '{\"yes\":0,\"emails\":[]}');\n\nfunction updateCount() {\n  const total = votes.yes + votes.emails.length;\n  const el = document.getElementById('validationCount');\n  if (total > 0) {\n    el.textContent = `${total} ${total === 1 ? 'person has' : 'people have'} said this makes sense`;\n  }\n}\n\nasync function handleYes() {\n  const btn = document.getElementById('btnYes');\n  if (btn.classList.contains('clicked')) return;\n  btn.classList.add('clicked');\n  btn.innerHTML = '<svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"/><\u002Fsvg> Noted — thank you';\n  votes.yes++;\n  localStorage.setItem('fl_votes', JSON.stringify(votes));\n  updateCount();\n  try {\n    await fetch('/', {\n      method: 'POST',\n      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },\n      body: new URLSearchParams({ 'form-name': 'validation', 'action': 'this-makes-sense' }).toString()\n    });\n  } catch(e) {}\n}\n\nfunction showEmail() {\n  document.getElementById('emailForm').classList.add('show');\n  document.getElementById('emailInput').focus();\n}\n\nasync function submitEmail(event) {\n  event.preventDefault();\n  const form = document.getElementById('emailForm');\n  const input = document.getElementById('emailInput');\n  const email = input.value.trim();\n  if (!email || !email.includes('@')) {\n    input.style.borderColor = '#ef4444';\n    setTimeout(() => { input.style.borderColor = ''; }, 1500);\n    return;\n  }\n  const formData = new FormData(form);\n  try {\n    const response = await fetch('/', {\n      method: 'POST',\n      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },\n      body: new URLSearchParams(formData).toString()\n    });\n    if (!response.ok) throw new Error('failed');\n    votes.emails.push(email);\n    localStorage.setItem('fl_votes', JSON.stringify(votes));\n    form.classList.remove('show');\n    document.getElementById('emailSuccess').classList.add('show');\n    document.getElementById('btnEmail').style.display = 'none';\n    updateCount();\n    form.reset();\n  } catch(e) {\n    input.style.borderColor = '#ef4444';\n    setTimeout(() => { input.style.borderColor = ''; }, 1500);\n  }\n}\n\ndocument.getElementById('emailForm').addEventListener('submit', submitEmail);\nupdateCount();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
